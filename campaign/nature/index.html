<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compass Campaign Kit</title>
  <style>
    :root {
      --paper: #f7f3ee;
      --ink: #171311;
      --muted: #6d6257;
      --accent: #8d2b20;
      --line: rgba(23, 19, 17, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(141,43,32,0.06), transparent 32%),
        linear-gradient(180deg, #fcfaf7 0%, var(--paper) 100%);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 42px;
    }
    .lead {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }
    .grid {
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    .card {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(30,24,21,0.08);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .body { padding: 18px 20px 24px; }
    .label {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.22em;
      margin-bottom: 10px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 24px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }
    .links {
      display: flex;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(23,19,17,0.28);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>土に触れると Campaign Kit</h1>
    <p class="lead">
      note、Instagram、ストーリー投稿でそのまま使える案内画像セット。
      白地、墨、余白をベースに、ひと目で「これは普通じゃない」と感じる温度に寄せています。
    </p>
    <div class="grid">
      <article class="card">
        <img src="./compass-note.png" alt="note thumbnail" />
        <div class="body">
          <div class="label">NOTE</div>
          <h2>note サムネイル</h2>
          <p>記事導線用の横長サムネ。LPとnote末尾CTAにも転用しやすいサイズです。</p>
          <div class="links"><a href="./compass-note.png">PNGを見る</a></div>
        </div>
      </article>
      <article class="card">
        <img src="./compass-instagram.png" alt="instagram square" />
        <div class="body">
          <div class="label">INSTAGRAM</div>
          <h2>Instagram 正方形</h2>
          <p>フィード投稿向け。言葉だけで強く引く1枚として使えます。</p>
          <div class="links"><a href="./compass-instagram.png">PNGを見る</a></div>
        </div>
      </article>
      <article class="card">
        <img src="./compass-story.png" alt="instagram story" />
        <div class="body">
          <div class="label">STORY</div>
          <h2>ストーリー縦長</h2>
          <p>毎日の告知や当日リマインド向け。リンク誘導と相性の良い縦長フォーマットです。</p>
          <div class="links"><a href="./compass-story.png">PNGを見る</a></div>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
