<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="13" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06" />
      </feComponentTransfer>
    </filter>
    <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="#FAF7F2"/>
  <rect width="1080" height="1080" fill="#000" filter="url(#paperNoise)"/>
  <path d="M76 138C212 96 374 56 548 82C640 96 770 150 916 166C978 172 1036 164 1100 132L1116 190C1052 228 986 242 910 236C748 224 636 164 516 154C350 140 222 182 88 250Z" fill="#111111" opacity="0.17" filter="url(#inkBlur)"/>
  <path d="M792 130C870 80 968 96 1016 166C1062 234 1054 334 996 396C930 470 826 480 764 416C702 350 696 214 792 130Z" fill="#111111" opacity="0.08"/>
  <text x="86" y="88" fill="#A5793E" font-size="22" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="9">YORU NO TERAKOYA</text>
  <text x="86" y="252" fill="#171311" font-size="98" font-weight="700" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif">
    <tspan x="86" dy="0">夜だから話せる、</tspan>
    <tspan x="86" dy="88">ほんまのことがある。</tspan>
  </text>
  <text x="86" y="456" fill="#3A312B" font-size="26" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="2">経営者とリーダーの源流に触れる少人数対話</text>
  
  <text x="86" y="998" fill="#6B5A4C" font-size="19" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="4">今里寺子屋 / 前田薫 / 毎月第4木曜</text>
  <rect x="924" y="918" width="86" height="86" rx="8" fill="#8D2B20"/>
  <text x="967" y="976" text-anchor="middle" fill="#F7F3EE" font-size="42" font-weight="700" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif">夜</text>
