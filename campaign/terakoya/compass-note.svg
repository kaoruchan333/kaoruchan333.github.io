  <text x="92" y="436" fill="#3A312B" font-size="28" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="2">経営者とリーダーの源流に触れる少人数対話</text>
  
  <text x="92" y="588" fill="#6B5A4C" font-size="19" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="4">今里寺子屋 / 前田薫 / 毎月第4木曜</text>
