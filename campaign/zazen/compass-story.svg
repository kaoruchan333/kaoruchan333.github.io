<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" fill="none">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="13" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06" />
      </feComponentTransfer>
    </filter>
    <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="#FAF7F2"/>
  <rect width="1080" height="1920" fill="#000" filter="url(#paperNoise)"/>
  <path d="M76 250C212 208 374 168 548 194C640 208 770 262 916 278C978 284 1036 276 1100 244L1116 302C1052 340 986 354 910 348C748 336 636 276 516 266C350 252 222 294 88 362Z" fill="#111111" opacity="0.17" filter="url(#inkBlur)"/>
  <path d="M792 182C870 132 968 148 1016 218C1062 286 1054 386 996 448C930 522 826 532 764 468C702 402 696 266 792 182Z" fill="#111111" opacity="0.08"/>
  <text x="94" y="140" fill="#A5793E" font-size="22" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="9">TENKAWA ZAZEN</text>
  <text x="94" y="400" fill="#171311" font-size="112" font-weight="700" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif">
    <tspan x="94" dy="0">静けさの中で、</tspan>
    <tspan x="94" dy="102">自分に還る。</tspan>
  </text>
  <text x="94" y="632" fill="#3A312B" font-size="34" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="2">本物の修行場で、自分の感覚を取り戻す</text>
  
  <text x="94" y="1220" fill="#3A312B" font-size="32" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="2">
    すでにやっていることを並べるだけで、
  </text>
  <text x="94" y="1274" fill="#3A312B" font-size="32" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="2">
    ほんまの自分の基準が見えてくる。
  </text>
  <text x="94" y="1510" fill="#A5793E" font-size="28" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="7">
    5,000 YEN / 1ST TUESDAY / IMAZATO
  </text>

  <text x="94" y="1782" fill="#6B5A4C" font-size="24" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" letter-spacing="4">天川村 / 前田薫 / 坐禅会</text>
  <rect x="924" y="1710" width="86" height="86" rx="8" fill="#8D2B20"/>
  <text x="967" y="1768" text-anchor="middle" fill="#F7F3EE" font-size="42" font-weight="700" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif">禅</text>
</svg>
