<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kaoru Note Thumbnail Gallery</title>
  <style>
    :root {
      --paper: #f7f3ee;
      --ink: #171311;
      --muted: #6d6257;
      --accent: #8d2b20;
      --line: rgba(23, 19, 17, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(141,43,32,0.06), transparent 32%),
        linear-gradient(180deg, #fcfaf7 0%, var(--paper) 100%);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 44px;
      letter-spacing: 0.06em;
    }
    .lead {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }
    .grid {
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .card {
      background: rgba(255,255,255,0.68);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(30,24,21,0.08);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .body {
      padding: 20px 20px 24px;
    }
    .series {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 27px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    }
    p {
      margin: 0;
      line-height: 1.8;
      color: var(--muted);
    }
    .links {
      display: flex;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(23,19,17,0.28);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Note Thumbnail Gallery</h1>
    <p class="lead">
      白地、墨、余白を軸にした、かおるちゃん用の note サムネイル統一デザイン。
      「人間交差点」は静かな緊張感、「愛しの自我くん観察日記」は観察の親しみを持たせています。
    </p>

    <div class="grid">
      <article class="card">
        <img src="./kanjo-wa-jijitsu-ja-nai.png" alt="感情は事実じゃない" />
        <div class="body">
          <div class="series">人間交差点</div>
          <h2>感情は事実じゃない</h2>
          <p>白地に墨の流れを引いて、凛とした余白で本質を切るシリーズ。</p>
          <div class="links">
            <a href="./kanjo-wa-jijitsu-ja-nai.png">PNGを見る</a>
            <a href="https://editor.note.com/notes/naf2ffceabf68/edit">note下書き</a>
          </div>
        </div>
      </article>

      <article class="card">
        <img src="./jiga-ai-hataraku-jidai.png" alt="AIと働く時代" />
        <div class="body">
          <div class="series">愛しの自我くん観察日記</div>
          <h2>AIと働く時代</h2>
          <p>少しだけ遊びと親しみを残しながら、自我くんの観察感を出すシリーズ。</p>
          <div class="links">
            <a href="./jiga-ai-hataraku-jidai.png">PNGを見る</a>
            <a href="/hub/">イベントハブ</a>
          </div>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
