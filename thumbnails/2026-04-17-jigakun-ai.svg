  <text x="126" y="226" fill="#171311" font-size="94" font-weight="700" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif"><tspan x="126" dy="0">AIが進化して、一番はしゃい</tspan><tspan x="126" dy="86">でるのは「自我くん」かもしれ</tspan><tspan x="126" dy="86">ない</tspan></text>
