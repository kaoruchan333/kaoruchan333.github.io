<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>よっちゃん専用ページ｜かおる塾</title>
  <style>
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      font-size: 16px;
      line-height: 1.9;
      color: #333;
      background: #faf9f6;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }
    .site-label {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: #aaa;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      font-weight: bold;
      margin: 0 0 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 56px;
    }
    h2 {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: #aaa;
      margin: 48px 0 16px;
      border-bottom: 1px solid #e8e8e0;
      padding-bottom: 8px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #b0a890; }
    .card-date { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .card-title { font-size: 17px; font-weight: bold; margin-bottom: 4px; }
    .card-desc { font-size: 14px; color: #777; }
    .private-note {
      margin-top: 60px;
      padding: 20px 24px;
      background: #f0ede4;
      border-radius: 8px;
      font-size: 14px;
      color: #888;
    }
    .back-link {
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 40px;
      display: inline-block;
    }
    .back-link:hover { color: #666; }
  </style>
</head>
<body>
  <div class="container">

    <a class="back-link" href="../../">← かおる塾トップ</a>

    <div class="site-label">MEMBERS</div>
    <h1>よっちゃん専用ページ</h1>
    <p class="subtitle">セッション記録・認知構造分析シート</p>

    <h2>2026年4月</h2>

    <a class="card" href="2026-04-26/">
      <div class="card-date">2026年4月26日 グループコーチング</div>
      <div class="card-title">認知構造分析シート＋ギフトページ</div>
      <div class="card-desc">「気になる」と感情の発見、「わかってほしい」の奥にあるもの</div>
    </a>

    <div class="private-note">
      このページはよっちゃん専用です。URLを他の方と共有しないでください。
    </div>

  </div>
</body>
</html>
