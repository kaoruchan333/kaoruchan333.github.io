<script>
(function(){
  var HASH='5ccc5274b688d517a2da7384ca2077c1b95451108b20e9456f0fd32c8e6e928e',KEY='kj_auth_v1';
  async function sha256(s){
    var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
  }
  if(localStorage.getItem(KEY)===HASH)return;
  document.documentElement.style.visibility='hidden';
  document.addEventListener('DOMContentLoaded',function(){
    var o=document.createElement('div');
    o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#2a2a28;z-index:9999;display:flex;align-items:center;justify-content:center;';
    o.innerHTML='<div style="text-align:center;color:#f0e8d8;max-width:320px;padding:0 24px;width:100%;">'
      +'<div style="font-size:11px;letter-spacing:0.2em;color:#c4a96e;margin-bottom:16px;">KAORU JUKU</div>'
      +'<div style="font-size:22px;font-weight:bold;margin-bottom:8px;line-height:1.5;">かおる塾<br>コミュニティ</div>'
      +'<div style="font-size:13px;color:#aaa;margin-bottom:32px;">会員限定ページです</div>'
      +'<input id="kj-pw" type="password" placeholder="パスワードを入力" style="width:100%;box-sizing:border-box;padding:14px 16px;border:1px solid #555;border-radius:8px;background:#3a3a38;color:#f0e8d8;font-size:16px;outline:none;margin-bottom:12px;">'
      +'<button id="kj-btn" style="width:100%;padding:14px;background:#c4a96e;color:#2a2a28;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;">入る</button>'
      +'<div id="kj-err" style="color:#e07070;font-size:13px;margin-top:12px;min-height:20px;"></div>'
      +'</div>';
    document.body.appendChild(o);
    document.documentElement.style.visibility='visible';
    var inp=document.getElementById('kj-pw');
    var err=document.getElementById('kj-err');
    async function check(){
      var h=await sha256(inp.value);
      if(h===HASH){localStorage.setItem(KEY,HASH);o.remove();}
      else{err.textContent='パスワードが違います';inp.value='';inp.focus();}
    }
    document.getElementById('kj-btn').addEventListener('click',check);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
    inp.focus();
  });
})();
</script>

<script id="kaoru-juku-password-guard-v1">
(function() {
  const PASS_HASH = '5ccc5274b688d517a2da7384ca2077c1b95451108b20e9456f0fd32c8e6e928e';
  const STORAGE_KEY = 'kaoru_juku_auth_v1';
  function unlock() {
    document.body.classList.remove('kj-auth-locked');
    const overlay = document.getElementById('kj-auth-overlay');
    if (overlay) overlay.remove();
  }
  async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function checkSaved() {
    if (localStorage.getItem(STORAGE_KEY) === PASS_HASH) unlock();
  }
  function render() {
    if (!document.body.classList.contains('kj-auth-locked')) return;
    const overlay = document.createElement('div');
    overlay.id = 'kj-auth-overlay';
    overlay.innerHTML = `
      <div class="kj-auth-card">
        <div class="kj-auth-label">Kaoru Juku Members</div>
        <h1>かおる塾メンバー専用ページ</h1>
        <p>このページを見るには、メンバー用パスワードを入力してください。</p>
        <input type="password" id="kj-auth-password" autocomplete="current-password" placeholder="パスワード">
        <button type="button" id="kj-auth-submit">表示する</button>
        <div class="kj-auth-error" id="kj-auth-error"></div>
      </div>`;
    document.body.appendChild(overlay);
    const input = document.getElementById('kj-auth-password');
    const error = document.getElementById('kj-auth-error');
    async function submit() {
      const digest = await sha256(input.value || '');
      if (digest === PASS_HASH) {
        localStorage.setItem(STORAGE_KEY, PASS_HASH);
        unlock();
      } else {
        error.textContent = 'パスワードが違います。';
        input.value = '';
        input.focus();
      }
    }
    document.getElementById('kj-auth-submit').addEventListener('click', submit);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
    setTimeout(() => input.focus(), 50);
  }
  checkSaved();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
