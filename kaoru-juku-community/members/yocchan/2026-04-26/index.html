body.kj-auth-locked > *:not(#kj-auth-overlay){display:none!important}
#kj-auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#26312b,#5b513f);display:grid;place-items:center;padding:22px;z-index:9999}.kj-auth-card{width:min(420px,100%);background:#fbfaf6;color:#2f2b26;border-radius:10px;padding:30px;box-shadow:0 24px 80px rgba(0,0,0,.28);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif}.kj-auth-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#9a6a3b;margin-bottom:10px}.kj-auth-card h1{font-size:24px;line-height:1.45;margin:0 0 10px}.kj-auth-card p{font-size:14px;color:#70685f}.kj-auth-card input{width:100%;min-height:46px;border:1px solid #d4cabd;border-radius:8px;padding:10px 12px;font-size:16px;background:#fff;margin:8px 0 12px}.kj-auth-card button{width:100%;min-height:46px;border:0;border-radius:8px;background:#26312b;color:#fff8e8;font-size:15px;font-weight:700}.kj-auth-error{min-height:22px;color:#a33;font-size:13px;margin-top:8px}

<script id="kaoru-juku-password-guard-v1">
(function() {
  const PASS_HASH = '1d3327e0df4257470c17e90db4c8651c840277973efc58a7ee5943f86c279b7b';
  const STORAGE_KEY = 'kaoru_juku_member_yocchan_auth_v1';
  function unlock() { document.body.classList.remove('kj-auth-locked'); const overlay = document.getElementById('kj-auth-overlay'); if (overlay) overlay.remove(); }
  async function sha256(text) { const data = new TextEncoder().encode(text); const hash = await crypto.subtle.digest('SHA-256', data); return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join(''); }
  function checkSaved() { if (localStorage.getItem(STORAGE_KEY) === PASS_HASH) unlock(); }
  function render() {
    if (!document.body.classList.contains('kj-auth-locked')) return;
    const overlay = document.createElement('div'); overlay.id = 'kj-auth-overlay';
    overlay.innerHTML = `<div class="kj-auth-card"><div class="kj-auth-label">Kaoru Juku Members</div><h1>本人専用ページ</h1><p>このページを見るには、本人用パスワードを入力してください。</p><input type="password" id="kj-auth-password" autocomplete="current-password" placeholder="パスワード"><button type="button" id="kj-auth-submit">表示する</button><div class="kj-auth-error" id="kj-auth-error"></div></div>`;
    document.body.appendChild(overlay);
    const input = document.getElementById('kj-auth-password'); const error = document.getElementById('kj-auth-error');
    async function submit() { const digest = await sha256(input.value || ''); if (digest === PASS_HASH) { localStorage.setItem(STORAGE_KEY, PASS_HASH); unlock(); } else { error.textContent = 'パスワードが違います。'; input.value = ''; input.focus(); } }
    document.getElementById('kj-auth-submit').addEventListener('click', submit); input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); }); setTimeout(() => input.focus(), 50);
  }
  checkSaved(); if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render); else render();
})();
</script>
