<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>「コンテンツより、あなたがやるから行く」 | 前田薫</title>
  <meta name="description" content="">
  <style>
    :root {
      --bg: #f8f3ec;
      --paper: rgba(255, 252, 246, 0.88);
      --ink: #1d1814;
      --soft: #675c54;
      --line: rgba(29, 24, 20, 0.12);
      --gold: #a7783e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(167, 120, 62, 0.14), transparent 24%),
        linear-gradient(180deg, #fcf8f3 0%, var(--bg) 100%);
    }
    .shell {
      width: min(900px, calc(100% - 36px));
      margin: 0 auto;
      padding: 68px 0 92px;
    }
    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .button,
    .button-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.65);
    }
    .article {
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 34px;
      background: var(--paper);
      box-shadow: 0 18px 40px rgba(29, 24, 20, 0.06);
    }
    .eyebrow {
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.34;
      font-weight: 500;
    }
    .meta {
      margin-top: 18px;
      color: var(--soft);
      font-size: 0.94rem;
    }
    .meta span {
      margin-right: 14px;
    }
    .body {
      margin-top: 30px;
      font-size: 1rem;
      line-height: 1.95;
      color: var(--ink);
    }
    .body h1,
    .body h2,
    .body h3 {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      line-height: 1.5;
      font-weight: 500;
      margin-top: 2.2em;
      margin-bottom: 0.9em;
    }
    .body h1 {
      font-size: 2rem;
    }
    .body h2 {
      font-size: 1.58rem;
    }
    .body h3 {
      font-size: 1.28rem;
    }
    .body p {
      margin: 0 0 1.1em;
    }
    .body hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 2em 0;
    }
    .body a {
      color: #7f4f35;
    }
    @media (max-width: 760px) {
      .shell { width: min(100% - 24px, 100%); }
      .article { padding: 24px 18px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav">
      <a class="button" href="../../">ホームへ戻る</a>
      <a class="button" href="../">発信一覧へ</a>
      <a class="button-ghost" href="https://note.com/nanbodemo/n/n074fc548f98a" target="_blank" rel="noopener noreferrer">noteで読む</a>
    </div>
    <article class="article">
      <div class="eyebrow">人間交差点</div>
      <h1>「コンテンツより、あなたがやるから行く」</h1>
      <div class="meta">
        <span>2026-04-25</span>
        <span></span>
      </div>
      <div class="body"></div>
    </article>
  </div>
</body>
</html>
